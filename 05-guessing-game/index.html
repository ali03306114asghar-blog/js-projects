<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guessing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
        .game { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 350px; text-align: center; color: #fff; }
        h1 { color: #e94560; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        #guessInput { padding: 12px; width: 150px; font-size: 18px; border: none; border-radius: 5px; text-align: center; }
        button { padding: 12px 25px; font-size: 16px; background: #e94560; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #c73250; }
        .message { font-size: 18px; margin: 20px 0; min-height: 30px; }
        .attempts { color: #aaa; margin-bottom: 15px; }
        .hint { color: #f39c12; font-size: 16px; margin: 10px 0; }
        #restartBtn { display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="game">
        <h1>Number Guessing Game</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Guess a number between 1 and 100</p>
        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter guess">
        </div>
        <button onclick="checkGuess()">Guess</button>
        <div class="attempts" id="attempts">Attempts: 0</div>
        <div class="message" id="message"></div>
        <div class="hint" id="hint"></div>
        <button id="restartBtn" onclick="restartGame()">Play Again</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
