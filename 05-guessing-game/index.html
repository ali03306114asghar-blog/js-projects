<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guessing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
        .game { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 350px; text-align: center; color: #fff; }
        h1 { color: #e94560; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        #guessInput { padding: 12px; width: 150px; font-size: 18px; border: none; border-radius: 5px; text-align: center; }
        button { padding: 12px 25px; font-size: 16px; background: #e94560; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #c73250; }
        .message { font-size: 18px; margin: 20px 0; min-height: 30px; }
        .attempts { color: #aaa; margin-bottom: 15px; }
        .hint { color: #f39c12; font-size: 16px; margin: 10px 0; }
        #restartBtn { display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="game">
        <h1>Number Guessing Game</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Guess a number between 1 and 100</p>
        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter guess">
        </div>
        <button onclick="checkGuess()">Guess</button>
        <div class="attempts" id="attempts">Attempts: 0</div>
        <div class="message" id="message"></div>
        <div class="hint" id="hint"></div>
        <button id="restartBtn" onclick="restartGame()">Play Again</button>
    </div>
    <script>
        let number, attempts = 0, maxAttempts = 10, gameOver = false;
        let low = 1, high = 100;
        function init() {
            number = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            gameOver = false;
            low = 1; high = 100;
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('attempts').textContent = `Attempts: ${attempts}/${maxAttempts}`;
            document.getElementById('message').textContent = '';
            document.getElementById('hint').textContent = '';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('guessInput').focus();
        }
        function checkGuess() {
            if (gameOver) return;
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            if (isNaN(guess) || guess < 1 || guess > 100) {
                document.getElementById('message').textContent = 'Please enter 1-100 only!';
                document.getElementById('message').style.color = '#f39c12';
                return;
            }
            attempts++;
            document.getElementById('attempts').textContent = `Attempts: ${attempts}/${maxAttempts}`;
            if (guess === number) {
                document.getElementById('message').textContent = `Correct! You won in ${attempts} attempts!`;
                document.getElementById('message').style.color = '#27ae60';
                endGame();
            } else if (guess < number) {
                document.getElementById('message').textContent = 'Too low! Try again.';
                document.getElementById('message').style.color = '#e74c3c';
                document.getElementById('hint').textContent = `Hint: Between ${guess} and ${high}`;
                low = guess;
            } else {
                document.getElementById('message').textContent = 'Too high! Try again.';
                document.getElementById('message').style.color = '#e74c3c';
                document.getElementById('hint').textContent = `Hint: Between ${low} and ${guess}`;
                high = guess;
            }
            if (attempts >= maxAttempts && guess !== number) {
                document.getElementById('message').textContent = `Game Over! Number was ${number}`;
                document.getElementById('message').style.color = '#e74c3c';
                endGame();
            }
            input.value = '';
            input.focus();
        }
        function endGame() {
            gameOver = true;
            document.getElementById('guessInput').disabled = true;
            document.getElementById('restartBtn').style.display = 'inline-block';
        }
        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkGuess();
        });
        init();
    </script>
</body>
</html>
