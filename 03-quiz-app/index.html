<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #2c3e50; }
        .app { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 500px; max-width: 90%; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .question { font-size: 18px; color: #333; margin-bottom: 20px; font-weight: bold; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option { padding: 12px; background: #ecf0f1; border: 2px solid #ecf0f1; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #3498db; color: #fff; border-color: #3498db; }
        .option.correct { background: #27ae60; color: #fff; border-color: #27ae60; }
        .option.wrong { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .score { text-align: center; font-size: 20px; color: #2c3e50; font-weight: bold; }
        button { padding: 12px 30px; background: #3498db; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="app">
        <h1 id="title">JavaScript Quiz</h1>
        <div id="quizContainer"></div>
        <button id="nextBtn" style="display:none;" onclick="nextQuestion()">Next</button>
        <button id="restartBtn" style="display:none;" onclick="restartQuiz()">Restart</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
