<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #2c3e50; }
        .app { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 500px; max-width: 90%; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .question { font-size: 18px; color: #333; margin-bottom: 20px; font-weight: bold; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option { padding: 12px; background: #ecf0f1; border: 2px solid #ecf0f1; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #3498db; color: #fff; border-color: #3498db; }
        .option.correct { background: #27ae60; color: #fff; border-color: #27ae60; }
        .option.wrong { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .score { text-align: center; font-size: 20px; color: #2c3e50; font-weight: bold; }
        button { padding: 12px 30px; background: #3498db; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="app">
        <h1 id="title">JavaScript Quiz</h1>
        <div id="quizContainer"></div>
        <button id="nextBtn" style="display:none;" onclick="nextQuestion()">Next</button>
        <button id="restartBtn" style="display:none;" onclick="restartQuiz()">Restart</button>
    </div>
    <script>
        const questions = [
            { q: "What is the output of typeof null?", options: ["null", "undefined", "object", "number"], answer: 2 },
            { q: "Which method converts JSON to object?", options: ["JSON.stringify()", "JSON.parse()", "JSON.toObject()", "JSON.convert()"], answer: 1 },
            { q: "What does === check?", options: ["Value only", "Reference only", "Type and value", "Memory"], answer: 2 },
            { q: "Which is not a primitive type?", options: ["String", "Number", "Array", "Boolean"], answer: 2 },
            { q: "What is closure in JS?", options: ["A function inside function", "Function with access to parent scope", "Data hiding", "All of above"], answer: 3 }
        ];
        let current = 0, score = 0;
        function loadQuestion() {
            const q = questions[current];
            document.getElementById('quizContainer').innerHTML = `
                <div class="question">Q${current+1}: ${q.q}</div>
                <div class="options">${q.options.map((o,i) => `<div class="option" onclick="selectOption(${i}, this)">${o}</div>`).join('')}</div>
            `;
            document.getElementById('nextBtn').style.display = 'block';
        }
        function selectOption(index, el) {
            const q = questions[current];
            document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
            if (index === q.answer) { el.classList.add('correct'); score++; }
            else { el.classList.add('wrong'); document.querySelectorAll('.option')[q.answer].classList.add('correct'); }
            document.getElementById('nextBtn').textContent = current === questions.length-1 ? 'See Result' : 'Next';
        }
        function nextQuestion() {
            current++;
            if (current < questions.length) loadQuestion();
            else showResult();
        }
        function showResult() {
            document.getElementById('quizContainer').innerHTML = `<div class="score">Your Score: ${score}/${questions.length}</div>`;
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'block';
        }
        function restartQuiz() { current = 0; score = 0; loadQuestion(); document.getElementById('restartBtn').style.display = 'none'; }
        loadQuestion();
    </script>
</body>
</html>
