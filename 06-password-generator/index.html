<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f3460; font-family: Arial, sans-serif; }
        .container { background: #16213e; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 400px; color: #fff; }
        h1 { text-align: center; margin-bottom: 25px; color: #e94560; }
        .output { background: #0f3460; padding: 12px; border-radius: 5px; word-break: break-all; font-size: 18px; margin-bottom: 15px; min-height: 45px; display: flex; align-items: center; }
        .settings { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .settings label { font-size: 14px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { width: 150px; }
        input[type="checkbox"] { width: 18px; height: 18px; }
        button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #c73250; }
        .copy-btn { background: #3498db; margin-top: 10px; }
        .copy-btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <div class="output" id="output">Click Generate</div>
        <div class="settings">
            <label>Length: <input type="range" id="length" min="6" max="30" value="12" oninput="document.getElementById('lenVal').textContent=this.value"> <span id="lenVal">12</span></label>
        </div>
        <div class="settings"><label><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label></div>
        <div class="settings"><label><input type="checkbox" id="lower" checked> Lowercase (a-z)</label></div>
        <div class="settings"><label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label></div>
        <div class="settings"><label><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label></div>
        <button onclick="generate()">Generate Password</button>
        <button class="copy-btn" onclick="copyPassword()">Copy to Clipboard</button>
    </div>
    <script>
        const chars = { upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', lower: 'abcdefghijklmnopqrstuvwxyz', numbers: '0123456789', symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?' };
        function generate() {
            const len = parseInt(document.getElementById('length').value);
            let pool = '';
            if (document.getElementById('upper').checked) pool += chars.upper;
            if (document.getElementById('lower').checked) pool += chars.lower;
            if (document.getElementById('numbers').checked) pool += chars.numbers;
            if (document.getElementById('symbols').checked) pool += chars.symbols;
            if (!pool) { document.getElementById('output').textContent = 'Select at least one option!'; return; }
            let password = '';
            const array = new Uint32Array(len);
            crypto.getRandomValues(array);
            for (let i = 0; i < len; i++) password += pool[array[i] % pool.length];
            document.getElementById('output').textContent = password;
        }
        function copyPassword() {
            const password = document.getElementById('output').textContent;
            if (password === 'Click Generate' || password === 'Select at least one option!') return;
            navigator.clipboard.writeText(password).then(() => alert('Copied!'));
        }
    </script>
</body>
</html>
