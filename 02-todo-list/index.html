<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #667eea; font-family: Arial, sans-serif; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 400px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        #taskInput { flex: 1; padding: 10px; border: 2px solid #667eea; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background: #667eea; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5a6fd6; }
        ul { list-style: none; }
        li { background: #f4f4f4; padding: 12px; margin-bottom: 8px; border-radius: 5px; display: flex; align-items: center; gap: 10px; }
        li.completed { background: #d4edda; text-decoration: line-through; color: #155724; }
        li button { padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
