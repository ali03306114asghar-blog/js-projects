<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .container { background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 420px; }
        h1 { text-align: center; color: #333; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #555; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: 0.2s; }
        input:focus { outline: none; border-color: #43e97b; }
        .unit-toggle { display: flex; gap: 10px; margin-bottom: 20px; background: #f0f0f0; padding: 5px; border-radius: 8px; }
        .unit-toggle button { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; border-radius: 5px; font-weight: bold; color: #666; transition: 0.2s; }
        .unit-toggle button.active { background: #43e97b; color: #fff; }
        button.calc { width: 100%; padding: 14px; background: #43e97b; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        button.calc:hover { background: #38d96a; }
        .result { margin-top: 25px; padding: 15px; border-radius: 10px; display: none; text-align: center; }
        .result.show { display: block; }
        .bmi-val { font-size: 42px; font-weight: bold; color: #333; }
        .category { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .gauge { height: 10px; background: linear-gradient(to right, #3498db, #f1c40f, #e67e22, #e74c3c); border-radius: 5px; margin-top: 15px; position: relative; }
        .pointer { position: absolute; top: -5px; width: 3px; height: 20px; background: #333; transform: translateX(-50%); transition: left 0.5s; }
        .tips { margin-top: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 14px; color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <div class="unit-toggle">
            <button class="active" onclick="setUnit('metric', this)">Metric (kg/cm)</button>
            <button onclick="setUnit('imperial', this)">Imperial (lb/ft)</button>
        </div>
        <div class="input-group"><label id="weightLabel">Weight (kg)</label><input type="number" id="weight" placeholder="Enter weight"></div>
        <div class="input-group"><label id="heightLabel">Height (cm)</label><input type="number" id="height" placeholder="Enter height"></div>
        <button class="calc" onclick="calculate()">Calculate BMI</button>
        <div class="result" id="result">
            <div class="bmi-val" id="bmiVal"></div>
            <div class="category" id="category"></div>
            <div class="gauge"><div class="pointer" id="pointer"></div></div>
            <div class="tips" id="tips"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
