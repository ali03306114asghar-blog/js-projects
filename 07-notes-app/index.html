<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        .app { display: flex; gap: 20px; max-width: 1000px; width: 95%; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .sidebar { flex: 1; border-right: 1px solid #eee; padding-right: 20px; }
        .sidebar h2 { color: #333; margin-bottom: 15px; font-size: 20px; }
        .sidebar input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        .notes-list { max-height: 400px; overflow-y: auto; }
        .note-item { padding: 10px; background: #f9f9f9; margin-bottom: 5px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .note-item:hover { background: #e8f0fe; }
        .note-item.active { background: #1976d2; color: #fff; }
        .note-item .title { font-weight: bold; }
        .main { flex: 2; }
        .main input { width: 100%; padding: 10px; font-size: 18px; border: none; border-bottom: 2px solid #1976d2; margin-bottom: 10px; }
        .main textarea { width: 100%; height: 350px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: none; font-size: 14px; }
        .btn { padding: 10px 20px; background: #1976d2; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn-danger { background: #dc3545; }
        .btn:hover { opacity: 0.9; }
        .search { padding: 5px; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h2>My Notes</h2>
            <input type="text" class="search" id="searchInput" placeholder="Search notes...">
            <input type="text" id="noteTitle" placeholder="Note title...">
            <div class="notes-list" id="notesList"></div>
        </div>
        <div class="main">
            <textarea id="noteContent" placeholder="Start typing your note..."></textarea>
            <br>
            <button class="btn" onclick="saveNote()">Save</button>
            <button class="btn btn-danger" onclick="deleteNote()">Delete</button>
        </div>
    </div>
    <script>
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let activeNote = null;
        function renderNotes() {
            const list = document.getElementById('notesList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';
            notes.filter(n => n.title.toLowerCase().includes(search)).forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'note-item' + (activeNote === i ? ' active' : '');
                div.innerHTML = `<span class="title">${n.title || 'Untitled'}</span><small>${new Date(n.date).toLocaleDateString()}</small>`;
                div.onclick = () => { activeNote = i; document.getElementById('noteTitle').value = n.title; document.getElementById('noteContent').value = n.content; renderNotes(); };
                list.appendChild(div);
            });
        }
        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            if (!title && !document.getElementById('noteContent').value.trim()) return;
            if (activeNote !== null) {
                notes[activeNote] = { title, content: document.getElementById('noteContent').value, date: Date.now() };
            } else {
                notes.unshift({ title, content: document.getElementById('noteContent').value, date: Date.now() });
                activeNote = 0;
            }
            localStorage.setItem('notes', JSON.stringify(notes));
            renderNotes();
        }
        function deleteNote() {
            if (activeNote === null) return;
            if (confirm('Delete this note?')) {
                notes.splice(activeNote, 1);
                localStorage.setItem('notes', JSON.stringify(notes));
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                activeNote = null;
                renderNotes();
            }
        }
        document.getElementById('searchInput').addEventListener('input', renderNotes);
        renderNotes();
    </script>
</body>
</html>
